<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&family=Playfair+Display:wght@600;700;800&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="inner-page error-page">
  <main class="error-shell">
    <section class="error-hero" aria-labelledby="error-title">
      <a class="error-logo error-logo-inline" href="index.html" aria-label="Food Delivery home">
        <img src="images/Food_Delivery_logo.png" alt="Food Delivery logo">
      </a>

      <div class="error-copy">
        <p class="eyebrow">Order route missing</p>
        <span class="error-code">404</span>
        <h1 id="error-title">This page slipped out of the delivery bag.</h1>
        <p>The link may be old, moved, or typed with an extra topping. Head back home or return to the page you came from.</p>
        <div class="error-actions">
          <a class="error-primary" href="index.html">Back to Home</a>
          <button class="error-secondary" type="button" data-go-back>Go Back</button>
        </div>
      </div>

      <div class="error-plate" aria-label="Food delivery missing page illustration">
        <img src="images/burger-card.png" alt="Burger meal">
        <div class="error-ticket">
          <strong>Delivery status</strong>
          <span>Page not found</span>
        </div>
        <div class="error-mini-card">
          <strong>Try again</strong>
          <span>Fresh routes available</span>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
