<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Foodly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&family=Playfair+Display:wght@600;700;800&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="inner-page login-page">
  <main class="login-experience">
    <section class="login-showcase">
      <a class="login-brand" href="index.html">
        <img src="images/Stackly_logo.png" alt="Foodly logo">
        <span>Foodly</span>
      </a>
      <div class="login-showcase-copy">
        <p class="eyebrow">Members' kitchen</p>
        <h1>Welcome to the <span>Foodly</span> table</h1>
        <p>Access favorite meals, saved addresses, live orders, rewards, and exclusive restaurant offers curated for every craving.</p>
      </div>
    </section>

    <section class="login-panel" aria-label="Foodly sign in">
      <div class="login-tabs" aria-label="Account actions">
        <a class="active" href="login.html" data-auth-mode="signin">Sign In</a>
        <a href="login.html#create-account" data-auth-mode="signup">Create Account</a>
      </div>

      <div class="login-heading">
        <h2>Sign In</h2>
        <p>Enter your Foodly dashboard.</p>
      </div>

      <div class="login-role-toggle" aria-label="Login type">
        <button class="active" type="button" data-login-role="user">User Login</button>
        <button type="button" data-login-role="admin">Admin Login</button>
      </div>

      <form class="login-form" action="dashboard.html" novalidate>
        <div class="signup-field">
          <label for="signup-name">Full Name</label>
          <input id="signup-name" type="text" placeholder="Your name" required>
        </div>

        <label for="login-email">Email Address</label>
        <input id="login-email" type="email" placeholder="you@example.com" required>

        <label for="login-password">Password</label>
        <div class="password-field">
          <input id="login-password" type="password" placeholder="Enter password" required>
        </div>

        <div class="signup-field">
          <label for="confirm-password">Confirm Password</label>
          <div class="password-field">
            <input id="confirm-password" type="password" placeholder="Confirm password" required>
          </div>
        </div>

        <div class="signup-field">
          <label for="signup-phone">Phone Number</label>
          <input id="signup-phone" type="tel" placeholder="Phone number" required>
        </div>

        <div class="login-options">
          <label><input type="checkbox"> Remember me</label>
          <a href="contact.html">Forgot password?</a>
        </div>

        <button type="submit">Sign In <span aria-hidden="true">-></span></button>
      </form>

      <div class="login-divider"><span>Or continue with</span></div>
      <div class="social-login">
        <a href="#" aria-label="Continue with Google">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M21.6 12.2c0-.7-.1-1.4-.2-2H12v3.8h5.4c-.2 1.2-.9 2.3-2 3v2.5h3.2c1.9-1.7 3-4.3 3-7.3z"/>
            <path fill="#34A853" d="M12 22c2.7 0 5-.9 6.6-2.5L15.4 17c-.9.6-2 .9-3.4.9-2.6 0-4.8-1.8-5.6-4.1H3.1v2.6C4.7 19.7 8.1 22 12 22z"/>
            <path fill="#FBBC05" d="M6.4 13.8c-.2-.6-.3-1.2-.3-1.8s.1-1.2.3-1.8V7.6H3.1C2.4 8.9 2 10.4 2 12s.4 3.1 1.1 4.4l3.3-2.6z"/>
            <path fill="#EA4335" d="M12 6.1c1.5 0 2.8.5 3.8 1.5l2.8-2.8C16.9 3.1 14.7 2 12 2 8.1 2 4.7 4.3 3.1 7.6l3.3 2.6C7.2 7.9 9.4 6.1 12 6.1z"/>
          </svg>
          Google
        </a>
        <a href="#" aria-label="Continue with Facebook">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#1877F2" d="M22 12a10 10 0 1 0-11.6 9.9v-7h-2.5V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.4h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12z"/>
          </svg>
          Facebook
        </a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
